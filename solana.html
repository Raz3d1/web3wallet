<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solana 自动化测试框架</title>
    <style>
    body { background: #f4f7f6; padding: 15px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .mode-switch {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin: 6px 0 14px 0;
    }
    .mode-switch button {
        border: 1px solid #dadce0;
        background: #fff;
        color: #202124;
        padding: 8px 12px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 600;
    }
    .mode-switch button.active {
        border-color: #1a73e8;
        color: #1a73e8;
        box-shadow: 0 2px 8px rgba(26,115,232,0.12);
    }
    .page-title {
        text-align: center;
        color: #1a73e8;
        font-size: 22px;
        font-weight: bold;
        margin-top: 10px;
        margin-bottom: 20px;
    }
    .v-section { margin-bottom: 20px; background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 15px; }
    .v-title {
        font-size: 18px; font-weight: bold; color: #1a73e8;
        border-bottom: 2px solid #e8f0fe; padding-bottom: 8px; margin-bottom: 12px;
    }
    .mutation-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
    .test-btn {
        padding: 12px; background: #fff; border: 1px solid #1a73e8;
        color: #1a73e8; border-radius: 6px; font-weight: 500; text-align: left;
        transition: all 0.2s;
    }
    .test-btn:active { background: #1a73e8; color: white; }
    .log-panel { background: #000; color: #0f0; padding: 10px; border-radius: 8px; height: 180px; overflow-y: auto; font-family: monospace; font-size: 11px; margin-top: 20px; }
    </style>
</head>
<body>
    <h1 class="page-title">Solana 钱包自动化测试</h1>

    <div class="mode-switch">
        <button onclick="location.href='index.html'">EVM 版本</button>
        <button class="active" onclick="location.href='solana.html'">Solana 版本</button>
    </div>

    <div id="test-container" class="btn-list"></div>
    <div id="log-panel" class="log-panel"></div>

    <!-- 仅用于加载 V7/V8 动态按钮列表（不执行 EVM RPC） -->
    <script src="fixtures-data/_runtime.js"></script>
    <script src="fixtures-data/V7.js"></script>
    <script src="fixtures-data/V8.js"></script>

    <script src="solana_app.js"></script>
</body>
</html>
